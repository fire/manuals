name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages via the Actions artifact flow.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: quarto-dev/quarto-actions/setup@v2

      # The render runs a Python cell (references.qmd reads CITATION.cff via
      # cffconvert), so it needs jupyter + cffconvert alongside panflute for the
      # decision-meta pandoc filter.
      - name: Set up Python packages
        run: pip install jupyter panflute cffconvert

      # Compute the build-info table at build time without a code engine: a
      # shell step writes the partial that build-info.qmd includes.
      - name: Generate the build-info table
        run: |
          {
            printf '| Field | Value |\n| --- | --- |\n'
            printf '| Build date (ISO 8601) | %s |\n' "$(date -u +%Y-%m-%d)"
            printf '| ISO year-week | %s |\n' "$(date -u +%Gw%V)"
            printf '| Day of year | %s |\n' "$(date -u +%j)"
            printf '| Weekday | %s |\n' "$(date -u +%A)"
            printf '| Days into 2026 | %s |\n' "$(( ($(date -u +%s) - $(date -u -d 2026-01-01 +%s)) / 86400 ))"
          } > _build-info-table.md

      - run: quarto render

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
